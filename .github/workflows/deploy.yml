name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar código
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Instalar Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4. Tests
      - name: Run tests
        run: npm test

      # 5. Build
      - name: Build
        run: npm run build

      # 6. Configurar AWS (ESTO SIEMPRE VA ANTES DE USAR AWS CLI)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-south-2

      # 7. (Opcional) comprobar credenciales
      - name: Test AWS credentials
        run: aws sts get-caller-identity

      # 8. Deploy a S3
      - name: Deploy to S3
        run: aws s3 sync ./dist s3://intergracioncontinuados --delete
